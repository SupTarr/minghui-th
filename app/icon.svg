<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1220" />
      <stop offset="100%" stop-color="#060913" />
    </linearGradient>

    <!-- Outer Outline Stroke Gradient -->
    <linearGradient id="outerGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#2dd4bf" />
    </linearGradient>

    <!-- Inner Glow/Shadow Gradient -->
    <radialGradient id="glowGrad" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0" />
    </radialGradient>

    <!-- Inner Shape Fill Gradient -->
    <linearGradient id="innerGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#042f2e" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0f766e" stop-opacity="0.9" />
    </linearGradient>

    <!-- Subtle Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark Rounded Square Container -->
  <rect width="512" height="512" rx="140" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="2" />

  <!-- Ambient Radial Glow -->
  <circle cx="256" cy="270" r="160" fill="url(#glowGrad)" />

  <!-- The Minimalist Lotus Petal/Flame Icon -->
  <g transform="translate(0, 10)">
    <!-- Outer Outline Petal -->
    <path 
      d="M 256 370 
         C 170 340, 160 230, 256 142 
         C 352 230, 342 340, 256 370 Z" 
      fill="none" 
      stroke="url(#outerGrad)" 
      stroke-width="16" 
      stroke-linejoin="round"
      stroke-linecap="round"
      filter="url(#glow)"
    />

    <!-- Inner Solid Petal -->
    <path 
      d="M 256 345 
         C 205 320, 195 255, 256 195 
         C 317 255, 307 320, 256 345 Z" 
      fill="url(#innerGrad)" 
      stroke="url(#outerGrad)"
      stroke-width="4"
      stroke-opacity="0.5"
    />
  </g>
</svg>
