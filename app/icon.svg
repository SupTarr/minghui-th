<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Outer Outline Stroke Gradient -->
    <linearGradient id="outerGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#2dd4bf" />
    </linearGradient>

    <!-- Inner Shape Fill Gradient -->
    <linearGradient id="innerGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0f766e" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
  </defs>

  <!-- Dark Backing Outline (Creates solid contrast on light/dark backgrounds and covers the entire shape area) -->
  <path 
    d="M 256 450 
       C 120 400, 100 200, 256 62 
       C 412 200, 392 400, 256 450 Z" 
    fill="#060913" 
    stroke="#060913" 
    stroke-width="56" 
    stroke-linejoin="round"
    stroke-linecap="round"
  />

  <!-- Bright Outer Outline Petal -->
  <path 
    d="M 256 450 
       C 120 400, 100 200, 256 62 
       C 412 200, 392 400, 256 450 Z" 
    fill="none" 
    stroke="url(#outerGrad)" 
    stroke-width="28" 
    stroke-linejoin="round"
    stroke-linecap="round"
  />

  <!-- Inner Shape -->
  <path 
    d="M 256 410 
       C 160 370, 145 250, 256 140 
       C 367 250, 352 370, 256 410 Z" 
    fill="url(#innerGrad)" 
    stroke="#060913"
    stroke-width="12"
    stroke-linejoin="round"
  />
</svg>
